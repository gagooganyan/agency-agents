<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Agency — AI Specialists</title>
  <style>/* ── Reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d14;
  --surface: #16161f;
  --surface2: #1e1e2e;
  --border: #2a2a3e;
  --text: #e2e2f0;
  --text-muted: #888;
  --accent: #7c6fff;
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 180ms ease;
}

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #0d0d20 0%, #12121e 100%);
  border-bottom: 1px solid var(--border);
  padding: 24px 0;
  position: sticky;
  top: 0;
  z-index: 40;
  backdrop-filter: blur(12px);
}

.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-icon {
  font-size: 2.2rem;
  line-height: 1;
}

.logo h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #a78bfa, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo p {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-top: 1px;
}

.header-stats {
  font-size: 0.85rem;
  color: var(--text-muted);
  background: var(--surface2);
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
}

/* ── Controls ── */
.controls {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 0;
}

.controls-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 220px;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  width: 16px;
  height: 16px;
  pointer-events: none;
}

#search {
  width: 100%;
  padding: 10px 14px 10px 38px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
  transition: border-color var(--transition);
}

#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--text-muted); }

.filter-wrap {
  display: flex;
  gap: 10px;
}

select {
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 0.88rem;
  outline: none;
  cursor: pointer;
  transition: border-color var(--transition);
}

select:focus { border-color: var(--accent); }

/* ── Main grid ── */
.main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 28px 24px 60px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 18px;
}

/* ── Agent card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--agent-color, var(--accent));
  opacity: 0.8;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  border-color: color-mix(in srgb, var(--agent-color, var(--accent)) 40%, var(--border));
}

.card-avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid var(--agent-color, var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  background: color-mix(in srgb, var(--agent-color, var(--accent)) 15%, var(--surface2));
  flex-shrink: 0;
}

.card-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-top {
  display: flex;
  align-items: center;
  gap: 12px;
}

.card-info { flex: 1; min-width: 0; }

.card-name {
  font-weight: 600;
  font-size: 0.95rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-category {
  font-size: 0.72rem;
  color: var(--agent-color, var(--accent));
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
  margin-top: 2px;
}

.card-vibe {
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-photo-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: color-mix(in srgb, var(--agent-color, var(--accent)) 25%, transparent);
  border: 1px solid var(--agent-color, var(--accent));
  border-radius: 4px;
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--agent-color, var(--accent));
  padding: 2px 6px;
  letter-spacing: 0.05em;
}

/* ── Empty state ── */
.empty {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-muted);
}
.empty span { font-size: 3rem; display: block; margin-bottom: 16px; }
.empty p { font-size: 1rem; }

/* ── Modal ── */
.modal {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal.hidden { display: none; }

.modal-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(4px);
}

.modal-box {
  position: relative;
  z-index: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
}

.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color var(--transition), border-color var(--transition);
  z-index: 2;
}
.modal-close:hover { color: var(--text); border-color: var(--text-muted); }

.modal-header {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 28px 28px 20px;
  border-bottom: 1px solid var(--border);
}

.modal-avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 3px solid var(--agent-color, var(--accent));
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  background: color-mix(in srgb, var(--agent-color, var(--accent)) 15%, var(--surface2));
  flex-shrink: 0;
}

.modal-avatar img { width: 100%; height: 100%; object-fit: cover; }

.modal-meta { flex: 1; min-width: 0; }

.modal-category {
  font-size: 0.72rem;
  color: var(--agent-color, var(--accent));
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 700;
}

.modal-meta h2 {
  font-size: 1.4rem;
  font-weight: 700;
  margin: 4px 0;
}

.modal-vibe {
  font-size: 0.85rem;
  color: var(--text-muted);
  font-style: italic;
  line-height: 1.4;
}

.modal-body {
  padding: 24px 28px 28px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.modal-description {
  font-size: 0.9rem;
  color: #ccc;
  line-height: 1.6;
}

/* ── Photo section ── */
.photo-section h3,
.tools-section h3 {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 14px;
}

.photo-preview-wrap {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 12px;
}

.photo-preview {
  width: 80px;
  height: 80px;
  border-radius: 12px;
  border: 2px dashed var(--border);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  background: var(--surface2);
  flex-shrink: 0;
  transition: border-color var(--transition);
}

.photo-preview.has-photo {
  border-style: solid;
  border-color: var(--agent-color, var(--accent));
}

.photo-preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.photo-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.photo-hint {
  font-size: 0.75rem;
  color: var(--text-muted);
  line-height: 1.5;
}

.photo-hint code {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 0.72rem;
  font-family: 'Fira Code', 'Courier New', monospace;
}

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: opacity var(--transition), background var(--transition);
  text-decoration: none;
}

.btn-primary {
  background: var(--accent);
  color: white;
}
.btn-primary:hover { opacity: 0.85; }

.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
}

/* ── Tools list ── */
.tools-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tool-badge {
  font-size: 0.75rem;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
}

/* ── Hidden util ── */
.hidden { display: none !important; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #444; }

/* ── Responsive ── */
@media (max-width: 600px) {
  .header-inner { flex-direction: column; align-items: flex-start; gap: 12px; }
  .controls-inner { flex-direction: column; }
  .filter-wrap { flex-wrap: wrap; }
  .grid { grid-template-columns: 1fr; }
  .modal-header { flex-direction: column; text-align: center; }
}
</style>
</head>

    'use strict';

// ── State ──────────────────────────────────────────────────────────────────
let allAgents = [];
let filtered = [];
let currentSlug = null;

const PHOTO_KEY = (slug) => `agency_photo_${slug}`;
const COLOR_MAP = {
  cyan: '#06b6d4', blue: '#3b82f6', purple: '#a855f7', pink: '#ec4899',
  red: '#ef4444', orange: '#f97316', yellow: '#eab308', green: '#22c55e',
  teal: '#14b8a6', indigo: '#6366f1', violet: '#8b5cf6', rose: '#f43f5e',
  gray: '#6b7280', slate: '#64748b', emerald: '#10b981', sky: '#0ea5e9',
  lime: '#84cc16', amber: '#f59e0b', fuchsia: '#d946ef',
};

function resolveColor(raw) {
  if (!raw) return '#7c6fff';
  if (raw.startsWith('#')) return raw;
  return COLOR_MAP[raw.toLowerCase()] || '#7c6fff';
}

// ── DOM refs ───────────────────────────────────────────────────────────────
const grid = document.getElementById('grid');
const emptyEl = document.getElementById('empty');
const searchEl = document.getElementById('search');
const categoryFilter = document.getElementById('category-filter');
const photoFilter = document.getElementById('photo-filter');
const agentCount = document.getElementById('agent-count');

const modal = document.getElementById('modal');
const modalClose = document.getElementById('modal-close');
const modalBackdrop = document.getElementById('modal-backdrop');
const modalAvatar = document.getElementById('modal-avatar');
const modalCategory = document.getElementById('modal-category');
const modalName = document.getElementById('modal-name');
const modalVibe = document.getElementById('modal-vibe');
const modalDescription = document.getElementById('modal-description');
const modalToolsSection = document.getElementById('tools-section');
const toolsList = document.getElementById('tools-list');
const photoPreview = document.getElementById('photo-preview');
const photoPreviewEmoji = document.getElementById('photo-preview-emoji');
const photoUpload = document.getElementById('photo-upload');
const photoRemove = document.getElementById('photo-remove');

// ── Bootstrap ──────────────────────────────────────────────────────────────
async function init() {
  allAgents = AGENTS_DATA;

  populateCategoryFilter();
  agentCount.textContent = allAgents.length;

  filtered = [...allAgents];
  renderGrid();

  searchEl.addEventListener('input', applyFilters);
  categoryFilter.addEventListener('change', applyFilters);
  photoFilter.addEventListener('change', applyFilters);
  modalClose.addEventListener('click', closeModal);
  modalBackdrop.addEventListener('click', closeModal);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

  photoUpload.addEventListener('change', handlePhotoUpload);
  photoRemove.addEventListener('click', handlePhotoRemove);
}

// ── Category filter options ────────────────────────────────────────────────
function populateCategoryFilter() {
  const cats = [...new Set(allAgents.map(a => a.category))].sort();
  for (const cat of cats) {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = formatCategory(cat);
    categoryFilter.appendChild(opt);
  }
}

function formatCategory(slug) {
  return slug.split('-').map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
}

// ── Filtering ──────────────────────────────────────────────────────────────
function applyFilters() {
  const q = searchEl.value.toLowerCase().trim();
  const cat = categoryFilter.value;
  const photo = photoFilter.value;

  filtered = allAgents.filter(a => {
    const matchQ = !q ||
      a.name.toLowerCase().includes(q) ||
      a.vibe.toLowerCase().includes(q) ||
      a.description.toLowerCase().includes(q) ||
      a.category.includes(q);
    const matchCat = !cat || a.category === cat;
    const hasPhoto = !!getStoredPhoto(a.slug);
    const matchPhoto = !photo ||
      (photo === 'with-photo' && hasPhoto) ||
      (photo === 'no-photo' && !hasPhoto);
    return matchQ && matchCat && matchPhoto;
  });

  renderGrid();
}

// ── Render card grid ───────────────────────────────────────────────────────
function renderGrid() {
  grid.innerHTML = '';
  if (filtered.length === 0) {
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');

  for (const agent of filtered) {
    grid.appendChild(buildCard(agent));
  }
}

function buildCard(agent) {
  const color = resolveColor(agent.color);
  const storedPhoto = getStoredPhoto(agent.slug);

  const card = document.createElement('div');
  card.className = 'card';
  card.style.setProperty('--agent-color', color);
  card.setAttribute('role', 'button');
  card.setAttribute('tabindex', '0');
  card.setAttribute('aria-label', `Open ${agent.name} agent details`);

  const avatarEl = document.createElement('div');
  avatarEl.className = 'card-top';

  const avatar = document.createElement('div');
  avatar.className = 'card-avatar';
  if (storedPhoto) {
    const img = document.createElement('img');
    img.src = storedPhoto;
    img.alt = agent.name;
    avatar.appendChild(img);
  } else {
    avatar.textContent = agent.emoji || '🤖';
  }

  const info = document.createElement('div');
  info.className = 'card-info';
  info.innerHTML = `
    <div class="card-name">${escHtml(agent.name)}</div>
    <div class="card-category">${escHtml(formatCategory(agent.category))}</div>
  `;

  avatarEl.appendChild(avatar);
  avatarEl.appendChild(info);
  card.appendChild(avatarEl);

  if (agent.vibe) {
    const vibe = document.createElement('div');
    vibe.className = 'card-vibe';
    vibe.textContent = agent.vibe;
    card.appendChild(vibe);
  }

  if (storedPhoto) {
    const badge = document.createElement('span');
    badge.className = 'card-photo-badge';
    badge.textContent = 'PHOTO';
    card.appendChild(badge);
  }

  card.addEventListener('click', () => openModal(agent));
  card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') openModal(agent); });

  return card;
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(agent) {
  currentSlug = agent.slug;
  const color = resolveColor(agent.color);

  modalAvatar.style.setProperty('--agent-color', color);
  modalCategory.textContent = formatCategory(agent.category);
  modalCategory.style.color = color;
  modalName.textContent = agent.name;
  modalVibe.textContent = agent.vibe || '';
  modalDescription.textContent = agent.description || '';

  modalAvatar.style.setProperty('border-color', color);
  photoPreview.style.setProperty('--agent-color', color);

  if (agent.tools && agent.tools.length > 0) {
    modalToolsSection.classList.remove('hidden');
    toolsList.innerHTML = agent.tools.map(t =>
      `<span class="tool-badge">${escHtml(t)}</span>`
    ).join('');
  } else {
    modalToolsSection.classList.add('hidden');
  }

  refreshModalPhoto(agent);
  modal.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function refreshModalPhoto(agent) {
  const color = resolveColor(agent.color);
  const stored = getStoredPhoto(agent.slug);

  modalAvatar.innerHTML = '';
  photoPreview.innerHTML = '';

  if (stored) {
    const imgA = document.createElement('img');
    imgA.src = stored;
    imgA.alt = agent.name;
    modalAvatar.appendChild(imgA);

    const imgP = document.createElement('img');
    imgP.src = stored;
    imgP.alt = agent.name;
    photoPreview.appendChild(imgP);
    photoPreview.classList.add('has-photo');
    photoRemove.style.display = '';
  } else {
    modalAvatar.textContent = agent.emoji || '🤖';
    const emojiEl = document.createElement('span');
    emojiEl.textContent = agent.emoji || '🤖';
    photoPreview.appendChild(emojiEl);
    photoPreview.classList.remove('has-photo');
    photoRemove.style.display = 'none';
  }

  photoUpload.value = '';
}

function closeModal() {
  modal.classList.add('hidden');
  document.body.style.overflow = '';
  currentSlug = null;
}

// ── Photo handling ─────────────────────────────────────────────────────────
function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file || !currentSlug) return;

  const reader = new FileReader();
  reader.onload = (ev) => {
    const dataUrl = ev.target.result;
    localStorage.setItem(PHOTO_KEY(currentSlug), dataUrl);
    const agent = allAgents.find(a => a.slug === currentSlug);
    if (agent) {
      refreshModalPhoto(agent);
      renderGrid();
    }
  };
  reader.readAsDataURL(file);
}

function handlePhotoRemove() {
  if (!currentSlug) return;
  localStorage.removeItem(PHOTO_KEY(currentSlug));
  const agent = allAgents.find(a => a.slug === currentSlug);
  if (agent) {
    refreshModalPhoto(agent);
    renderGrid();
  }
}

function getStoredPhoto(slug) {
  return localStorage.getItem(PHOTO_KEY(slug)) || null;
}

// ── Utils ──────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Start ──────────────────────────────────────────────────────────────────
init().catch(console.error);

  </script>
