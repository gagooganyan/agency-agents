name: VPN Server Check
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Read VPN config from server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 213.239.157.6
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "=== VPN CONFIG ==="
            cat /root/vpn_config.txt 2>/dev/null || echo "File not found"
            echo ""
            echo "=== 3x-ui STATUS ==="
            systemctl is-active x-ui 2>/dev/null || echo "x-ui not running"
            echo ""
            echo "=== OPEN PORTS ==="
            ss -tlnp | grep -E "443|54321|2096"
            echo ""
            echo "=== CERT STATUS ==="
            ls /etc/letsencrypt/live/ 2>/dev/null || echo "No certs"
