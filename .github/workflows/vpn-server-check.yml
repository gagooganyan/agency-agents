name: VPN Server Check
on:
  workflow_dispatch:
    inputs:
      vps_password:
        description: 'VPS root password'
        required: true
        type: string

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Read VPN config from server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 213.239.157.6
          username: root
          password: ${{ inputs.vps_password }}
          script: |
            echo "=== VPN CONFIG ==="
            cat /root/vpn_config.txt 2>/dev/null || echo "File not found"
            echo "=== 3x-ui STATUS ==="
            systemctl is-active x-ui 2>/dev/null || echo "not running"
            echo "=== PORTS ==="
            ss -tlnp 2>/dev/null | grep -E ":443|:54321|:2096" || echo "none"
            echo "=== CERT ==="
            ls /etc/letsencrypt/live/ 2>/dev/null || echo "no certs"
